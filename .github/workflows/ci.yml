name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ============================================
  # Code Quality Checks
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - run: npm ci
      - name: Generate routes
        run: npm run generate:routes
      
      - name: Generate Convex types
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY || secrets.CONVEX_DEPLOY_KEY_PREVIEW }}
        run: |
          if [[ -n "${CONVEX_DEPLOY_KEY}" ]]; then
            npx convex dev --once --typecheck=disable
          else
            echo "::warning::No CONVEX_DEPLOY_KEY secret configured — Convex types cannot be generated."
          fi

      - name: Type Check
        run: |
          if [[ -f "convex/_generated/api.d.ts" ]]; then
            npm run typecheck
          else
            echo "::warning::Skipping typecheck — Convex generated types are missing. Set CONVEX_DEPLOY_KEY secret to enable."
          fi

  format:
    name: Format Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - run: npm ci
      - name: Check formatting
        run: npx prettier --check . || true

  # ============================================
  # Security Checks
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high || true

  # ============================================
  # Build Verification
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - run: npm ci
      - name: Generate routes
        run: npm run generate:routes
      
      - name: Generate Convex types
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY || secrets.CONVEX_DEPLOY_KEY_PREVIEW }}
        run: |
          if [[ -n "${CONVEX_DEPLOY_KEY}" ]]; then
            npx convex dev --once --typecheck=disable
          else
            echo "::warning::No CONVEX_DEPLOY_KEY secret configured — Convex types cannot be generated."
          fi

      - name: Build
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_APP_ENV: preview
        run: |
          if [[ ! -f "convex/_generated/api.d.ts" ]]; then
            echo "::warning::Skipping build — Convex generated types are missing. Set CONVEX_DEPLOY_KEY secret to enable."
            exit 0
          fi
          export VITE_CONVEX_URL="${VITE_CONVEX_URL:-https://example.convex.cloud}"
          export VITE_CONVEX_SITE_URL="${VITE_CONVEX_SITE_URL:-https://example.convex.site}"
          npm run build:preview
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ============================================
  # Summary
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
