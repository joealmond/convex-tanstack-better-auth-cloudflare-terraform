name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VITE_CONVEX_URL: https://example.convex.cloud
  VITE_CONVEX_SITE_URL: https://example.convex.site
  VITE_APP_ENV: preview

jobs:
  validate:
    name: Format, lint, test, typecheck, audit, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.15.8

      - name: Install locked dependencies
        run: npm ci

      - name: Verify generated route tree is current
        run: |
          npm run generate:routes
          git diff --exit-code -- src/routeTree.gen.ts

      - name: Check formatting
        run: npm run format:check

      - name: Lint without warnings
        run: npm run lint -- --max-warnings=0

      - name: Test with coverage gates
        run: npm run test:coverage

      - name: Test create-convexkit composition
        run: npm run test:cli

      - name: Typecheck
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Validate Terraform
        working-directory: infrastructure
        run: |
          terraform fmt -check
          terraform init -backend=false -lockfile=readonly
          terraform validate

      - name: Build preview bundle
        run: npm run build:preview

      - name: Build documentation site
        run: npm run docs:build

      - name: Verify CLI package contents
        working-directory: packages/create-convexkit
        run: npm pack --dry-run

      - name: Validate generated Worker bundle
        run: |
          npm run sync:wrangler-config
          npx wrangler deploy --dry-run --config dist/server/wrangler.json --outdir /tmp/convexkit-worker

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public browser smoke tests
        run: npm run test:e2e:public
